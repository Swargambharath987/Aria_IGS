server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Required for SSE (Server-Sent Events) to work through nginx
    add_header X-Accel-Buffering no;

    # SPA routing — fall back to index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static asset caching — 1-day expiry for immutable build artifacts
    location ~* \.(js|css|png|svg|ico)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }
}
