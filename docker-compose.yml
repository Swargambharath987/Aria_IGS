services:

  postgres:
    image: postgres:16-alpine
    container_name: aria-postgres
    environment:
      POSTGRES_DB:       aria
      POSTGRES_USER:     aria
      POSTGRES_PASSWORD: aria_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aria -d aria"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  aria-backend:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: aria-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data/chroma_db:/app/data/chroma_db
      - ./prompts:/app/prompts
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=postgresql+psycopg2://aria:aria_dev_password@postgres:5432/aria
      - API_TOKENS=igs-dev-token

      # LLM — OpenAI-compatible endpoint (Ollama /v1 locally, vLLM on GPU server)
      # Local dev:   LLM_BASE_URL=http://host.docker.internal:11434/v1
      # Production:  LLM_BASE_URL=http://igs-gpu:8080/v1
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      - LLM_MODEL=${LLM_MODEL:-gemma4:e4b}
      - LLM_API_KEY=${LLM_API_KEY:-not-needed}
      - LLM_CONTEXT_WINDOW=${LLM_CONTEXT_WINDOW:-32768}

      # Embeddings — always Ollama (lightweight, no GPU needed)
      - OLLAMA_HOST=http://host.docker.internal:11434
      - EMBED_MODEL=${EMBED_MODEL:-nomic-embed-text}

      # Auth — replace DEMO_USERS with LDAP once IT provides AD details
      - JWT_SECRET=${JWT_SECRET:-aria-dev-secret-change-in-prod}
      - DEMO_USERS=${DEMO_USERS:-admin:aria_demo,user1:aria_user}

      # SSH tools — set to enable live Slurm data (leave blank to disable)
      - SLURM_SSH_HOST=${SLURM_SSH_HOST:-}
      - SLURM_SSH_KEY_PATH=${SLURM_SSH_KEY_PATH:-}
      - SLURM_SSH_DEFAULT_USER=${SLURM_SSH_DEFAULT_USER:-}
      - SLURM_SSH_TIMEOUT=15

    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  aria-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
        VITE_API_TOKEN: ${VITE_API_TOKEN:-igs-dev-token}
        VITE_USER_ID: ${VITE_USER_ID:-dev}
    container_name: aria-frontend
    ports:
      - "3000:80"
    depends_on:
      aria-backend:
        condition: service_healthy
    restart: unless-stopped

  slurm-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: aria-mcp
    ports:
      - "8001:8001"
    environment:
      - SLURM_API_URL=${SLURM_API_URL:-http://localhost:6820}
      - SLURM_API_VERSION=${SLURM_API_VERSION:-v0.0.41}
      - SLURM_JWT_KEY=${SLURM_JWT_KEY:-}
      - SLURM_VERIFY_SSL=${SLURM_VERIFY_SSL:-true}
      - SLURM_TIMEOUT=30
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/sse"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
